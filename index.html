<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเช็คชื่อนักเรียน เทส</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts: Prompt -->
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- SweetAlert2 (สำหรับ Pop-up บนมือถือสวยๆ) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      font-family: 'Prompt', sans-serif;
      background-color: #f4f6f9;
      color: #333;
    }

    /* Card ตกแต่งฟอร์ม */
    .card-custom {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      background: #ffffff;
      transition: all 0.3s ease;
    }

    .form-control, .form-select {
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      font-size: 0.95rem;
    }

    .form-control:focus, .form-select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    /* ปุ่มกด */
    .btn-gradient-primary {
      background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
      transition: all 0.2s ease;
    }

    .btn-gradient-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.35);
      color: white;
    }

    .btn-gradient-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-weight: 600;
      font-size: 1.05rem;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
      transition: all 0.2s ease;
    }

    .btn-gradient-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(16, 185, 129, 0.4);
      color: white;
    }

    /* ตาราง */
    .table-custom {
      border-collapse: separate;
      border-spacing: 0;
    }

    .table-custom thead th {
      background-color: #f8fafc;
      color: #475569;
      font-weight: 600;
      border-bottom: 2px solid #e2e8f0;
      padding: 14px;
    }

    .table-custom tbody tr {
      transition: background-color 0.2s;
    }

    .table-custom tbody tr:hover {
      background-color: #f1f5f9;
    }

    /* ตกแต่ง Radio Buttons เช็คชื่อ */
    .btn-check:checked + .btn-outline-success {
      background-color: #10b981 !important;
      border-color: #10b981 !important;
      color: white !important;
    }

    .btn-check:checked + .btn-outline-warning {
      background-color: #f59e0b !important;
      border-color: #f59e0b !important;
      color: white !important;
    }

    .btn-check:checked + .btn-outline-danger {
      background-color: #ef4444 !important;
      border-color: #ef4444 !important;
      color: white !important;
    }

    .btn-check:checked + .btn-outline-secondary {
      background-color: #6b7280 !important;
      border-color: #6b7280 !important;
      color: white !important;
    }

    .status-group .btn {
      border-radius: 8px !important;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 6px 10px;
    }

    /* รองรับการแสดงผลบนมือถือ */
    @media (max-width: 768px) {
      .table-responsive {
        font-size: 0.9rem;
      }
      .btn-gradient-success {
        width: 100%;
      }
    }
  </style>
</head>
<body class="p-3 p-md-4">

  <div class="container-fluid max-width-lg">
    <!-- ฟอร์มเลือกข้อมูล -->
    <div class="card card-custom p-3 p-md-4 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label fw-medium"><i class="fa-regular fa-calendar-check me-2 text-primary"></i>วันที่บันทึกกิจกรรม:</label>
          <input type="date" id="attendanceDate" class="form-control">
        </div>
        <div class="col-md-5">
          <label class="form-label fw-medium"><i class="fa-solid fa-graduation-cap me-2 text-primary"></i>เลือกระดับชั้นเรียน:</label>
          <select id="classSelect" class="form-select">
  <!-- ถ้าในชีทพิมพ์ ป.1 ให้แก้ value="ป.1" แบบนี้ครับ -->
  <option value="ป.1">ประถมศึกษาปีที่ 1</option>
  <option value="ป.2">ประถมศึกษาปีที่ 2</option>
  <option value="ป.3">ประถมศึกษาปีที่ 3</option>
  <option value="ป.4">ประถมศึกษาปีที่ 4</option>
  <option value="ป.5">ประถมศึกษาปีที่ 5</option>
  <option value="ป.6">ประถมศึกษาปีที่ 6</option>
</select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-gradient-primary w-100" onclick="loadStudentList()">
            <i class="fa-solid fa-arrows-rotate me-2"></i>ดึงรายชื่อนักเรียน
          </button>
        </div>
      </div>
    </div>

    <!-- ตารางแสดงรายชื่อนักเรียน -->
    <div class="card card-custom p-2 p-md-3">
      <div class="table-responsive">
        <table class="table table-custom align-middle mb-0">
          <thead>
            <tr class="text-center">
              <th style="width: 12%;">เลขที่</th>
              <th style="width: 38%; text-align: left;">ชื่อ - นามสกุล</th>
              <th style="width: 35%;">สถานะการเข้าเรียน</th>
              <th style="width: 15%;">สถานะ</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            <tr>
              <td colspan="4" class="text-center py-5 text-muted" id="statusMessage">
                <i class="fa-solid fa-clipboard-user fa-3x mb-3 d-block text-secondary opacity-50"></i>
                กรุณากดปุ่ม <b>"ดึงรายชื่อนักเรียน"</b> ด้านบนเพื่อเริ่มเช็คชื่อ
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ปุ่มบันทึกข้อมูล -->
    <div class="text-end mt-4">
      <button class="btn btn-gradient-success" onclick="submitAttendance()">
        <i class="fa-solid fa-floppy-disk me-2"></i>ยืนยันบันทึกข้อมูลวันนี้
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
