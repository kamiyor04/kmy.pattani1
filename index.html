<!-- ส่วนปุ่มและฟอร์มควบคุม (อ้างอิงตาม UI ในรูป) -->
<div class="card p-4">
  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">วันที่บันทึกกิจกรรม:</label>
      <input type="date" id="attendanceDate" class="form-control">
    </div>
    <div class="col-md-5">
      <label class="form-label">เลือกระดับชั้นเรียน:</label>
      <select id="classSelect" class="form-select">
        <option value="ประถมศึกษาปีที่ 1">ประถมศึกษาปีที่ 1</option>
        <option value="ประถมศึกษาปีที่ 2">ประถมศึกษาปีที่ 2</option>
        <option value="ประถมศึกษาปีที่ 3">ประถมศึกษาปีที่ 3</option>
        <option value="ประถมศึกษาปีที่ 4">ประถมศึกษาปีที่ 4</option>
        <option value="ประถมศึกษาปีที่ 5">ประถมศึกษาปีที่ 5</option>
        <option value="ประถมศึกษาปีที่ 6">ประถมศึกษาปีที่ 6</option>
      </select>
    </div>
    <div class="col-md-3 d-flex align-items-end">
      <button class="btn btn-primary w-100" onclick="loadStudentList()">
        🔄 โหลดรายชื่อ / รีเฟรช
      </button>
    </div>
  </div>
</div>

<!-- ตารางแสดงรายชื่อนักเรียน -->
<div class="table-responsive mt-4">
  <table class="table table-bordered align-middle">
    <thead class="table-light text-center">
      <tr>
        <th style="width: 10%;">เลขที่</th>
        <th style="width: 35%;">ชื่อ - นามสกุล</th>
        <th style="width: 40%;">สถานะการเข้าเรียน</th>
        <th style="width: 15%;">การจัดการ</th>
      </tr>
    </thead>
    <tbody id="studentTableBody">
      <tr>
        <td colspan="4" class="text-center py-4 text-muted" id="statusMessage">
          กรุณากดปุ่ม "โหลดรายชื่อ / รีเฟรช" เพื่อดึงข้อมูล
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="text-end mt-3">
  <button class="btn btn-primary btn-lg" onclick="submitAttendance()">
    💾 ยืนยันบันทึกข้อมูลวันนี้
  </button>
</div>

<script>
  // ⚠️ วาง Web App URL ที่ได้จากการ Deploy Google Apps Script ตรงนี้ครับ
  const WEB_APP_URL = "YOUR_WEB_APP_URL_HERE";

  // ตั้งค่าวันที่ปัจจุบันลงในช่อง Date Picker อัตโนมัติ
  document.getElementById('attendanceDate').valueAsDate = new Date();

  // ฟังก์ชันดึงรายชื่อนักเรียน (ปรับใช้ fetch API)
  async function loadStudentList() {
    const className = document.getElementById('classSelect').value;
    const tbody = document.getElementById('studentTableBody');
    
    // แสดงสถานะกำลังโหลด
    tbody.innerHTML = `
      <tr>
        <td colspan="4" class="text-center py-4">
          ⏳ กำลังดึงข้อมูลรายชื่อนักเรียน...
        </td>
      </tr>`;

    try {
      // ยิงคำสั่งดึงข้อมูลไปยัง Apps Script Web App
      const response = await fetch(`${WEB_APP_URL}?action=getStudents&className=${encodeURIComponent(className)}`);
      
      if (!response.ok) throw new Error("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้");
      
      const result = await response.json();
      renderStudentTable(result);
    } catch (error) {
      handleError(error);
    }
  }

  // ฟังก์ชันแสดงตารางรายชื่อนักเรียน
  function renderStudentTable(response) {
    const tbody = document.getElementById('studentTableBody');
    
    if (response.status === "error") {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">❌ เกิดข้อผิดพลาด: ${response.message}</td></tr>`;
      return;
    }

    const students = response.data;
    if (!students || students.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-warning">⚠️ ไม่พบรายชื่อนักเรียนในระดับชั้นนี้</td></tr>`;
      return;
    }

    let html = '';
    students.forEach((student, index) => {
      html += `
        <tr>
          <td class="text-center">${student.no}</td>
          <td>${student.name}</td>
          <td class="text-center">
            <div class="btn-group w-100" role="group">
              <input type="radio" class="btn-check" name="status_${index}" id="present_${index}" value="มา" checked>
              <label class="btn btn-outline-success" for="present_${index}">มา</label>

              <input type="radio" class="btn-check" name="status_${index}" id="late_${index}" value="สาย">
              <label class="btn btn-outline-warning" for="late_${index}">สาย</label>

              <input type="radio" class="btn-check" name="status_${index}" id="absent_${index}" value="ขาด">
              <label class="btn btn-outline-danger" for="absent_${index}">ขาด</label>

              <input type="radio" class="btn-check" name="status_${index}" id="leave_${index}" value="ลา">
              <label class="btn btn-outline-secondary" for="leave_${index}">ลา</label>
            </div>
          </td>
          <td class="text-center">
             <span class="badge bg-light text-dark border">พร้อมบันทึก</span>
          </td>
        </tr>
      `;
    });

    tbody.innerHTML = html;
  }

  // ฟังก์ชันส่งข้อมูลไปบันทึก (ปรับใช้ fetch API แบบ POST)
  async function submitAttendance() {
    const date = document.getElementById('attendanceDate').value;
    const className = document.getElementById('classSelect').value;
    const tbody = document.getElementById('studentTableBody');
    const rows = tbody.querySelectorAll('tr');

    if (rows.length === 0 || document.getElementById('statusMessage')) {
      alert('กรุณาโหลดรายชื่อนักเรียนก่อนทำการบันทึกครับ');
      return;
    }

    let attendanceData = [];
    rows.forEach((row, index) => {
      const no = row.cells[0]?.innerText;
      const name = row.cells[1]?.innerText;
      const statusRadio = document.querySelector(`input[name="status_${index}"]:checked`);
      
      if (no && name) {
        attendanceData.push({
          date: date,
          no: no,
          name: name,
          className: className,
          status: statusRadio ? statusRadio.value : "มา"
        });
      }
    });

    if (confirm(`ยืนยันการบันทึกข้อมูลการเช็คชื่อ ${className} จำนวน ${attendanceData.length} คน?`)) {
      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "saveAttendance",
            records: attendanceData
          })
        });

        const res = await response.json();
        if (res.status === "success") {
          alert("✅ " + res.message);
        } else {
          alert("❌ บันทึกไม่สำเร็จ: " + res.message);
        }
      } catch (error) {
        handleError(error);
      }
    }
  }

  // ฟังก์ชันดักจับ Error กรณีการเชื่อมต่อล้มเหลว
  function handleError(error) {
    const tbody = document.getElementById('studentTableBody');
    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">❌ เชื่อมต่อระบบไม่สำเร็จ: ${error.message}</td></tr>`;
    alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อระบบ: " + error.message);
  }
</script>
