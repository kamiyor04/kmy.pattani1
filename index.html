<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเช็กชื่อ - โรงเรียนชุมชนบ้านกามิยอร์</title>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    button { background: #4f46e5; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 20px; border-radius: 20px; display: none; }
  </style>
</head>
<body>

  <div class="card">
    <h2>🏫 ระบบเช็กชื่อ (GitHub + Google Sheets)</h2>
    <!-- โครงสร้างปุ่ม/ตัวเลือกชั้นเรียนของคุณเกิร์ล -->
    <button onclick="saveAttendance()">💾 บันทึกข้อมูลลง Google Sheets</button>
  </div>

  <div id="toast" class="toast">✅ บันทึกสำเร็จแล้วค๊าาา!</div>

  <script>
    // 🔑 เอา URL ที่ได้จาก Deploy ในสเต็ปที่ 1 มาวางตรงนี้ค๊aaa
    const GOOGLE_SCRIPT_URL = "วาง_WEB_APP_URL_ของคุณเกิร์ลตรงนี้";

    function saveAttendance() {
      showToast("⏳ กำลังบันทึกข้อมูล...");

      const payload = {
        cls: "ป.1", // ตัวอย่างชั้น
        dateSelected: new Date().toISOString().split('T')[0],
        recs: { "1": "มา", "2": "ขาด" }
      };

      // ยิงข้อมูลไปที่ Google Sheets ตรง ๆ
      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(res => res.text())
      .then(data => {
        showToast("✅ บันทึกเรียบร้อยแล้วค๊าาา!");
      })
      .catch(err => {
        showToast("❌ เกิดข้อผิดพลาด กรุณาลองใหม่");
      });
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.innerText = msg;
      t.style.display = "block";
      setTimeout(() => { t.style.display = "none"; }, 2500);
    }
  </script>
</body>
</html>
